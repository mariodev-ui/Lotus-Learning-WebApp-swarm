version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CORS_ORIGIN=http://localhost:3001
      - JWT_SECRET=your_jwt_secret_here
      - EMAIL_USER=your_email_user_here
      - EMAIL_PASSWORD=your_email_password_here

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REACT_APP_API_URL=http://localhost:3000
